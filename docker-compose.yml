version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: data_driven_content_api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://user:password@db:5432/data_driven_db?schema=public
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    container_name: data_driven_content_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: data_driven_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
